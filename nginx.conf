server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Leaderboard API — proxied to the `api` compose service.
    # Resolver + variable => the hostname is resolved LAZILY per request, so
    # nginx (and the game) starts fine even when the api service is absent;
    # requests then fail fast (<2s) and the client degrades gracefully.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
        # Cap the body upstream: the API rejects >4 KB anyway (clean 422), but
        # this stops nginx buffering a ~1 MB body only to have it thrown away.
        client_max_body_size 8k;
        # Per-client rate limiting keys off X-Real-IP. Direct on :8080 this is
        # correct and un-spoofable ($remote_addr wins). BEHIND A TLS-TERMINATING
        # REVERSE PROXY, $remote_addr is that proxy's IP — the same for everyone,
        # so the API's 10 submit/min becomes GLOBAL. In that topology, uncomment
        # the two `real_ip` lines below and set the CIDR of your proxy so nginx
        # trusts the client IP it forwards (see README §Hosting):
        #   set_real_ip_from 10.0.0.0/8;   # <-- your TLS proxy's network
        #   real_ip_header   X-Forwarded-For;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
