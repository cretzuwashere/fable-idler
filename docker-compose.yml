services:
  # Production build served by nginx — the default: `docker compose up --build`
  # NOTE: no depends_on api — the game must run 100% standalone (`up web`).
  web:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped

  # Hall of Fables leaderboard API (Node 22, zero deps). Internal only:
  # NO host port — nginx (web) proxies /api/ to it over the compose network.
  api:
    build: ./server
    restart: unless-stopped
    volumes:
      - leaderboard_data:/data
    environment:
      - LEADERBOARD_DATA_FILE=/data/leaderboard.json
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Hot-reload development server: `docker compose --profile dev up dev`
  dev:
    image: node:22-bookworm-slim
    working_dir: /app
    profiles: ["dev"]
    depends_on: [api]
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  # Unit tests (Vitest): `docker compose run --rm test-unit`
  test-unit:
    image: node:22-bookworm-slim
    working_dir: /app
    profiles: ["test"]
    command: sh -c "npm install --no-audit --no-fund && npm run test"
    volumes:
      - .:/app
      - node_modules_test:/app/node_modules

  # End-to-end tests (Playwright) against the production build:
  # `docker compose run --rm --build test-e2e`
  test-e2e:
    image: mcr.microsoft.com/playwright:v1.49.1-noble
    working_dir: /app
    profiles: ["test"]
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    command: sh -c "npm install --no-audit --no-fund && npx playwright test"
    environment:
      - PW_BASE_URL=http://web:80
    volumes:
      - .:/app
      - node_modules_e2e:/app/node_modules

volumes:
  node_modules_dev:
  node_modules_test:
  node_modules_e2e:
  leaderboard_data:
